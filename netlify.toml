[build]
  command = "npm run build"
  publish = "dist/simple-crud-angular/browser"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/api/users/:id"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
